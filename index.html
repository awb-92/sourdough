            renderTimelinePreview() {
                const container = document.getElementById('timelinePreview');
                if (!container) return;
                const recipes = this.getRecipes();
                const recipe = recipes[this.selectedRecipe];
                if (!recipe) { container.innerHTML = ''; return; }

                const startingStepIndex = parseInt(document.getElementById('startingStep').value) || 0;
                let startTime;
                if (this.mode === 'forward') {
                    const v = document.getElementById('startTime').value;
                    startTime = v ? new Date(v) : new Date();
                } else {
                    const v = document.getElementById('endTime').value;
                    const endTime = v ? new Date(v) : new Date();
                    const totalDuration = this.calcTotalDur(recipe, startingStepIndex);
                    startTime = new Date(endTime - totalDuration);
                }

                const hasBranches = recipe.steps.some(s => s.branch === 'today') && recipe.steps.some(s => s.branch === 'cold' || s.postProofChoice);

                // Build main steps (non-branch)
                const buildTimeline = (branchChoice) => {
                    const steps = [];
                    let ct = new Date(startTime);
                    const startingFromBranch = recipe.steps[startingStepIndex] && recipe.steps[startingStepIndex].branch;
                    const startBranch = startingFromBranch ? recipe.steps[startingStepIndex].branch : null;

                    // For cold path, reorder: shared → cold branch → today branch
                    let orderedSteps = recipe.steps.map((s, i) => ({...s, _i: i}));
                    if (branchChoice === 'cold' && !startingFromBranch) {
                        const shared = orderedSteps.filter(s => !s.branch);
                        const coldBranch = orderedSteps.filter(s => s.branch === 'cold');
                        const todayBranch = orderedSteps.filter(s => s.branch === 'today');
                        orderedSteps = [...shared, ...coldBranch, ...todayBranch];
                    }

                    orderedSteps.forEach((step) => {
                        const index = step._i;
                        if (startingFromBranch) {
                            if (index < startingStepIndex) return;
                            if (step.branch && step.branch !== startBranch && step.branch !== 'today') return;
                            if (!step.branch) return;
                        } else {
                            if (index < startingStepIndex) return;
                            if (step.branch) {
                                if (branchChoice === 'today' && step.branch === 'cold') return;
                                if (branchChoice === 'cold' && step.branch !== 'cold' && step.branch !== 'today') return;
                                if (!branchChoice) return;
                            }
                        }

                        let d;
                        if (step.expandable && step.options) {
                            d = step.options[0].sets * step.foldInterval;
                        } else if (step.options) {
                            d = step.options[0].duration || step.duration || 0;
                        } else if (typeof step.duration === 'object') {
                            d = (step.duration.min + step.duration.max) / 2;
                        } else {
                            d = step.duration || 0;
                        }
                        const u = (typeof step.duration === 'object' ? step.duration.unit : step.unit) || 'minutes';
                        steps.push({ name: step.name, time: new Date(ct), duration: d, unit: u, branch: step.branch || null });
                        ct = new Date(ct.getTime() + d * (u === 'hours' ? 3600000 : 60000));
                    });
                    return steps;
                };

                const fmtTime = (d) => d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
                const fmtDay = (d) => {
                    const today = new Date();
                    const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
                    if (d.toDateString() === today.toDateString()) return '';
                    if (d.toDateString() === tomorrow.toDateString()) return ' +1d';
                    return ` (${d.toLocaleDateString('en-US', { weekday: 'short' })})`;
                };

                const getEndTime = (steps) => {
                    if (steps.length === 0) return null;
                    const last = steps[steps.length - 1];
                    return new Date(last.time.getTime() + last.duration * (last.unit === 'hours' ? 3600000 : 60000));
                };

                let html = '<div class="timeline-preview"><h4>Timeline Preview</h4>';
                if (hasBranches) {
                    const todaySteps = buildTimeline('today');
                    const coldSteps = buildTimeline('cold');

                    // Merge into unified rows using two-pointer with re-convergence
                    const allRows = [];
                    let ti = 0, ci = 0;
                    while (ti < todaySteps.length || ci < coldSteps.length) {
                        const ts = ti < todaySteps.length ? todaySteps[ti] : null;
                        const cs = ci < coldSteps.length ? coldSteps[ci] : null;
                        if (ts && cs && ts.name === cs.name) {
                            // Same step in both paths (shared or re-converged)
                            allRows.push({ name: ts.name, today: ts.time, cold: cs.time });
                            ti++; ci++;
                        } else if (ts && (!cs || !coldSteps.slice(ci).find(s => s.name === ts.name))) {
                            // Today-only step
                            allRows.push({ name: ts.name, today: ts.time, cold: null, branch: ts.branch });
                            ti++;
                        } else if (cs && (!ts || !todaySteps.slice(ti).find(s => s.name === cs.name))) {
                            // Cold-only step
                            allRows.push({ name: cs.name, today: null, cold: cs.time, branch: cs.branch });
                            ci++;
                        } else if (cs) {
                            // Cold step exists in today path later — emit cold-only first
                            allRows.push({ name: cs.name, today: null, cold: cs.time, branch: cs.branch });
                            ci++;
                        } else {
                            allRows.push({ name: ts.name, today: ts.time, cold: null, branch: ts.branch });
                            ti++;
                        }
                    }

                    html += '<div class="tl-table">';
                    html += '<div class="tl-header-row"><div class="tl-name-col"></div><div class="tl-time-col">Same Day</div><div class="tl-time-col">Cold Proof</div></div>';
                    allRows.forEach(row => {
                        const branchClass = row.branch ? ' tl-branch-row' : '';
                        const onlyClass = (row.today && !row.cold) || (!row.today && row.cold) ? ' tl-only' : '';
                        const todayStr = row.today ? `${fmtTime(row.today)}${fmtDay(row.today)}` : '';
                        const coldStr = row.cold ? `${fmtTime(row.cold)}${fmtDay(row.cold)}` : '';
                        html += `<div class="tl-row${branchClass}${onlyClass}"><div class="tl-name-col">${row.name}</div><div class="tl-time-col">${todayStr}</div><div class="tl-time-col">${coldStr}</div></div>`;
                    });
                    const todayEnd = getEndTime(todaySteps);
                    const coldEnd = getEndTime(coldSteps);
                    html += `<div class="tl-total-row"><div class="tl-name-col">Done</div><div class="tl-time-col">${todayEnd ? '~' + fmtTime(todayEnd) + fmtDay(todayEnd) : ''}</div><div class="tl-time-col">${coldEnd ? '~' + fmtTime(coldEnd) + fmtDay(coldEnd) : ''}</div></div>`;
                    html += '</div>';
                } else {
                    const steps = buildTimeline(null);
                    html += '<div class="tl-table">';
                    html += '<div class="tl-header-row"><div class="tl-name-col"></div><div class="tl-time-col">Time</div></div>';
                    steps.forEach(s => {
                        html += `<div class="tl-row"><div class="tl-name-col">${s.name}</div><div class="tl-time-col">${fmtTime(s.time)}${fmtDay(s.time)}</div></div>`;
                    });
                    const end = getEndTime(steps);
                    if (end) html += `<div class="tl-total-row"><div class="tl-name-col">Done</div><div class="tl-time-col">~${fmtTime(end)}${fmtDay(end)}</div></div>`;
                    html += '</div>';
                }
                html += '</div>';
                container.innerHTML = html;
                this.renderStarterReminder();
            },

            renderStarterReminder() {
                const container = document.getElementById('starterReminderSection');
                if (!container) return;
                // Only show for recipes that use starter (check ingredients)
                const recipes = this.getRecipes();
                const recipe = recipes[this.selectedRecipe];
                if (!recipe) { container.innerHTML = ''; return; }
                const hasStarter = recipe.ingredients && recipe.ingredients.some(ig => /starter|levain/i.test(ig));
                if (!hasStarter) { container.innerHTML = ''; return; }

                let startTime;
                if (this.mode === 'forward') {
                    const v = document.getElementById('startTime').value;
                    startTime = v ? new Date(v) : new Date();
                } else {
                    const v = document.getElementById('endTime').value;
                    const endTime = v ? new Date(v) : new Date();
                    const totalDuration = this.calcTotalDur(recipe, 0);
                    startTime = new Date(endTime - totalDuration);
                }

                const feedTime = new Date(startTime.getTime() - this.starterLeadHours * 3600000);
                const now = new Date();
                const isPast = feedTime < now;
                const fmtT = (d) => d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
                const fmtD = (d) => {
                    const today = new Date();
                    if (d.toDateString() === today.toDateString()) return 'Today';
                    const tmrw = new Date(today); tmrw.setDate(tmrw.getDate() + 1);
                    if (d.toDateString() === tmrw.toDateString()) return 'Tomorrow';
                    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                };

                const leadOptions = [4, 6, 8, 12];
                const pillsHtml = leadOptions.map(h =>
                    `<button class="starter-lead-pill${h === this.starterLeadHours ? ' active' : ''}" onclick="app.setStarterLeadHours(${h})">${h}h</button>`
                ).join('');

                const reminderActive = this.starterReminderTime && !this.starterReminderFired;

                let html = `<div class="starter-reminder">
                    <h4><svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#FFD60A;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg> Feed Your Starter</h4>
                    <div>Feed <span class="reminder-time">${this.starterLeadHours}h before</span> mixing</div>
                    <div class="starter-lead-pills">${pillsHtml}</div>
                    <div style="margin-top:8px">
                        <span style="color:#EBEBF5;font-size:15px">${fmtD(feedTime)} at </span>
                        <span class="reminder-time">${fmtT(feedTime)}</span>
                    </div>`;

                if (isPast) {
                    const hoursAgo = Math.round((now - feedTime) / 3600000);
                    html += `<div class="reminder-note" style="color:#FF453A">⚠ Feeding time was ${hoursAgo}h ago</div>`;
                } else if (reminderActive) {
                    html += `<div class="reminder-set">✓ Reminder set</div>`;
                } else {
                    html += `<button class="btn btn-sm" style="margin-top:10px" onclick="app.setStarterReminder()">Set Reminder</button>`;
                }

                html += '</div>';
                container.innerHTML = html;
            },

            setStarterLeadHours(hours) {
                this.starterLeadHours = hours;
                this.starterReminderTime = null;
                this.starterReminderFired = false;
                this.renderStarterReminder();
            },

            setStarterReminder() {
                let startTime;
                if (this.mode === 'forward') {
                    const v = document.getElementById('startTime').value;
                    startTime = v ? new Date(v) : new Date();
                } else {
                    const v = document.getElementById('endTime').value;
                    const recipes = this.getRecipes();
                    const recipe = recipes[this.selectedRecipe];
                    const endTime = v ? new Date(v) : new Date();
                    startTime = new Date(endTime - this.calcTotalDur(recipe, 0));
                }
                this.starterReminderTime = new Date(startTime.getTime() - this.starterLeadHours * 3600000);
                this.starterReminderFired = false;
                this.renderStarterReminder();
            },

            sendStarterReminder() {
                this.starterReminderFired = true;
                this.playAlert();
                const recipeName = this.selectedRecipe ? (this.getRecipes()[this.selectedRecipe]?.name || 'your bake') : 'your bake';
                if (Notification.permission === 'granted') {
                    new Notification('Feed Your Starter', { body: `Time to feed your starter for ${recipeName}!`, icon: '🍞' });
                }
            },

            setDefaultStartTime() {
                const now = new Date();
                now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                const v = now.toISOString().slice(0, 16);
                document.getElementById('startTime').value = v;
                document.getElementById('endTime').value = v;
            },

            renderRecipeOptions() {
                const recipes = this.getRecipes();
                const recipe = recipes[this.selectedRecipe];
                const container = document.getElementById('recipeOptions');
                const optionSteps = recipe.steps.filter(step => step.options && !step.branch);
                if (optionSteps.length === 0) { container.innerHTML = ''; return; }

                container.innerHTML = '<h3>Options</h3>' + optionSteps.map(step => {
                    const ai = recipe.steps.indexOf(step);
                    return `<div class="option-group"><h4>${step.name}</h4><div class="pill-group">
                        ${step.options.map((opt, oi) => `<input type="radio" class="pill-chip" name="option_${ai}" id="option_${ai}_${oi}" value="${oi}" ${oi === 0 ? 'checked' : ''}><label for="option_${ai}_${oi}">${opt.name}</label>`).join('')}
                    </div></div>`;
                }).join('');
            },

            calculateTimeline() {
                const recipes = this.getRecipes();
                const recipe = recipes[this.selectedRecipe];
                const startingStepIndex = parseInt(document.getElementById('startingStep').value);
                let startTime;

                if (this.mode === 'forward') {
                    startTime = new Date(document.getElementById('startTime').value);
                } else {
                    const endTime = new Date(document.getElementById('endTime').value);
                    const totalDuration = this.calcTotalDur(recipe, startingStepIndex);
                    startTime = new Date(endTime - totalDuration);
                }

                const selectedOptions = {};
                recipe.steps.forEach((step, index) => {
                    if (step.options) {
                        const sel = document.querySelector(`input[name="option_${index}"]:checked`);
                        if (sel) selectedOptions[index] = parseInt(sel.value);
                    }
                });

                const bake = {
                    id: Date.now().toString(),
                    recipeKey: this.selectedRecipe,
                    recipeName: recipe.name,
                    mode: this.mode,
                    selectedOptions,
                    ingredientsChecked: {},
                    notes: [],
                    steps: [],
                    currentStepIndex: 0,
                    startingStepIndex
                };

                let currentTime = new Date(startTime);
                const startingFromBranch = recipe.steps[startingStepIndex] && recipe.steps[startingStepIndex].branch;
                const startBranch = startingFromBranch ? recipe.steps[startingStepIndex].branch : null;

                recipe.steps.forEach((step, index) => {
                    // When starting from a branch step, only include steps in that branch
                    // from the starting index onward
                    if (startingFromBranch) {
                        if (index < startingStepIndex) return;
                        if (step.branch && step.branch !== startBranch && step.branch !== 'today') return;
                        if (!step.branch) return; // skip non-branch steps when starting from a branch
                    } else {
                        if (step.branch) return; // skip branch steps during initial timeline
                    }
                    let duration;

                    if (step.expandable && step.options) {
                        const soi = selectedOptions[index] || 0;
                        const opt = step.options[soi];
                        for (let s = 1; s <= opt.sets; s++) {
                            const stepData = {
                                name: `${step.name} (${s}/${opt.sets})`,
                                time: new Date(currentTime), duration: step.foldInterval, unit: 'minutes',
                                guidance: step.guidance, completed: false,
                                selectedOption: opt.name, stepIndex: index
                            };
                            if (s === 1 && step.alert) stepData.alert = step.alert;
                            bake.steps.push(stepData);
                            currentTime = new Date(currentTime.getTime() + step.foldInterval * 60000);
                        }
                    } else if (step.options) {
                        const soi = selectedOptions[index] || 0;
                        const opt = step.options[soi];
                        duration = opt.duration || step.duration || 0;
                        const unit = opt.unit || step.unit;
                        bake.steps.push({
                            name: step.name, time: new Date(currentTime), duration, unit,
                            guidance: step.guidance, completed: false,
                            selectedOption: opt.name, stepIndex: index,
                            postProofChoice: step.postProofChoice || false
                        });
                        currentTime = new Date(currentTime.getTime() + duration * (unit === 'hours' ? 3600000 : 60000));
                    } else {
                        if (typeof step.duration === 'object' && step.duration.min) {
                            duration = (step.duration.min + step.duration.max) / 2;
                        } else {
                            duration = step.duration || 0;
                        }
                        bake.steps.push({
                            name: step.name, time: new Date(currentTime), duration, unit: (typeof step.duration === 'object' ? step.duration.unit : step.unit) || 'minutes',
                            guidance: step.guidance, completed: false, stepIndex: index,
                            postProofChoice: step.postProofChoice || false,
                            bulkFermentChoice: step.bulkFermentChoice || false,
                            noTimer: step.noTimer || false,
                            noNotification: step.noNotification || false,
                            autoStartNext: step.autoStartNext || false
                        });
                        const u = (typeof step.duration === 'object' ? step.duration.unit : step.unit) || 'minutes';
                        currentTime = new Date(currentTime.getTime() + duration * (u === 'hours' ? 3600000 : 60000));
                    }
                });

                // Auto-start the first uncompleted step
                const firstActive = bake.steps.find(s => !s.completed);
                if (firstActive) firstActive.started = true;

                this.activeBakes.push(bake);
                this.saveActiveBakes();
                this.showTimelineView(bake.id);
            },

            calcTotalDur(recipe, startIdx = 0) {
                let total = 0;
                const startingFromBranch = recipe.steps[startIdx] && recipe.steps[startIdx].branch;
                const startBranch = startingFromBranch ? recipe.steps[startIdx].branch : null;
                recipe.steps.forEach((step, i) => {
                    if (i < startIdx) return;
                    if (startingFromBranch) {
                        if (!step.branch) return;
                        if (step.branch !== startBranch && step.branch !== 'today') return;
                    } else {
                        if (step.branch) return;
                    }
                    let d;
                    if (step.expandable && step.options) {
                        total += step.options[0].sets * step.foldInterval * 60000;
                    } else if (step.options) {
                        d = step.options[0].duration || step.duration || 0;
                        const u = step.options[0].unit || step.unit || 'minutes';
                        total += d * (u === 'hours' ? 3600000 : 60000);
                    } else {
                        if (typeof step.duration === 'object' && step.duration.min) d = (step.duration.min + step.duration.max) / 2;
                        else d = step.duration || 0;
                        const u = (typeof step.duration === 'object' ? step.duration.unit : step.unit) || 'minutes';
                        total += d * (u === 'hours' ? 3600000 : 60000);
                    }
                });
                return total;
            },

            renderIngredients(bake) {
                const recipes = this.getRecipes();
                const recipe = recipes[bake.recipeKey];
                if (!recipe) return;
                const container = document.getElementById('ingredientsSection');
                const mult = bake.ingredientMultiplier || 1;
                const allChecked = recipe.ingredients.every((_, i) => bake.ingredientsChecked[i]);
                // Auto-collapse when all checked, remember manual toggle
                const isCollapsed = this.ingredientsCollapsed[bake.id] !== undefined
                    ? this.ingredientsCollapsed[bake.id]
                    : allChecked;
                const checkedCount = recipe.ingredients.filter((_, i) => bake.ingredientsChecked[i]).length;

                let noteHtml = '';
                if (recipe.note) noteHtml = `<div style="font-size:13px;color:#8E8E93;padding:8px 0;border-top:0.5px solid rgba(60,60,67,0.36);margin-top:4px;">${recipe.note}</div>`;

                container.innerHTML = `
                    <div class="ingredients-header" onclick="app.toggleIngredientsCollapse('${bake.id}')">
                        <h3>Ingredients <span style="color:#8E8E93;font-size:13px;font-weight:400">(${checkedCount}/${recipe.ingredients.length})</span></h3>
                        <div class="ing-toggle">
                            <div class="multiplier-control" onclick="event.stopPropagation()">
                                ${[1,2,3,4].map(m => `<button class="multiplier-btn ${mult===m?'active':''}" onclick="event.stopPropagation();app.setMultiplier('${bake.id}',${m})">${m}x</button>`).join('')}
                            </div>
                            <span class="ing-chevron ${isCollapsed?'collapsed':''}">▼</span>
                        </div>
                    </div>
                    <div class="ingredients-body ${isCollapsed?'collapsed':''}" style="max-height:${isCollapsed?'0':'2000px'}">
                        ${recipe.ingredients.map((ing, i) => {
                            const checked = bake.ingredientsChecked[i] || false;
                            const scaled = mult > 1 ? this.scaleIng(ing, mult) : ing;
                            return `<div class="ingredient-item ${checked?'checked':''}">
                                <input type="checkbox" id="ing_${i}" ${checked?'checked':''} onchange="app.toggleIng('${bake.id}',${i})">
                                <label for="ing_${i}">${scaled}</label>
                            </div>`;
                        }).join('')}
                        ${noteHtml}
                    </div>
                `;
            },

            toggleIngredientsCollapse(bakeId) {
                const current = this.ingredientsCollapsed[bakeId];
                this.ingredientsCollapsed[bakeId] = current === undefined ? true : !current;
                const bake = this.activeBakes.find(b => b.id === bakeId);
                if (bake) this.renderIngredients(bake);
            },

            setMultiplier(bakeId, m) {
                const bake = this.activeBakes.find(b => b.id === bakeId);
                if (!bake) return;
                bake.ingredientMultiplier = m;
                this.saveActiveBakes();
                this.renderIngredients(bake);
                this.renderTimelineSteps(bake);
            },

            scaleIng(text, mult) {
                return text.replace(/(\([^)]*\))|(\d+\.?\d*)(°[FC]|%|\s*(?:hours?|hrs?|minutes?|mins?|seconds?|secs?|days?|months?))?/gi, (match, paren, num, suffix) => {
                    if (paren) return paren;
                    if (num) {
                        // Don't scale temperatures, percentages, or time durations
                        if (suffix) return match;
                        const s = parseFloat(num) * mult;
                        return s % 1 === 0 ? s.toString() : parseFloat(s.toFixed(2)).toString();
                    }
                    return match;
                });
            },

            toggleIng(bakeId, idx) {
                const bake = this.activeBakes.find(b => b.id === bakeId);
                if (!bake) return;
                bake.ingredientsChecked[idx] = !bake.ingredientsChecked[idx];
                // Auto-collapse when all checked
                const recipes = this.getRecipes();
                const recipe = recipes[bake.recipeKey];
                if (recipe && recipe.ingredients.every((_, i) => bake.ingredientsChecked[i])) {
                    this.ingredientsCollapsed[bakeId] = true;
                }
                this.saveActiveBakes();
                this.renderIngredients(bake);
            },

            renderTimelineSteps(bake) {
                const container = document.getElementById('timelineSteps');
                const csi = this.getCurrentStepIndex(bake);
                const recipes = this.getRecipes();
                const recipe = recipes[bake.recipeKey];

                // Separate completed and remaining steps
                const completedSteps = [];
                const remainingSteps = [];
                bake.steps.forEach((step, index) => {
                    if (step.completed && index < csi) completedSteps.push({ step, index });
                    else remainingSteps.push({ step, index });
                });

                let html = '<h3>Timeline</h3>';

                // Completed steps collapse header
                if (completedSteps.length > 0) {
                    const isExpanded = this.completedStepsExpanded[bake.id] || false;
                    html += `<div class="completed-steps-header" onclick="app.toggleCompletedSteps('${bake.id}')">
                        <span>${completedSteps.length} completed step${completedSteps.length > 1 ? 's' : ''}</span>
                        <span class="csh-chevron ${isExpanded?'open':''}">›</span>
                    </div>`;
                    if (isExpanded) {
                        completedSteps.forEach(({ step, index }) => {
                            html += this.renderStepCard(bake, step, index, csi, recipe);
                        });
                    } else {
                        // Always show the last completed step with undo button
                        const last = completedSteps[completedSteps.length - 1];
                        html += this.renderStepCard(bake, last.step, last.index, csi, recipe);
                    }
                }

                // Remaining steps (active + upcoming)
                remainingSteps.forEach(({ step, index }) => {
                    html += this.renderStepCard(bake, step, index, csi, recipe);
                });

                container.innerHTML = html;

                // Also render notes and recipe reference
                this.renderBakeNotes(bake);
                this.renderRecipeReference(bake);
            },

            toggleCompletedSteps(bakeId) {
                this.completedStepsExpanded[bakeId] = !this.completedStepsExpanded[bakeId];
                const bake = this.activeBakes.find(b => b.id === bakeId);
                if (bake) this.renderTimelineSteps(bake);
            },

            renderStepCard(bake, step, index, csi, recipe) {
                const recipeStep = recipe ? recipe.steps[step.stepIndex] : null;
                const isCompleted = step.completed;
                const isActive = index === csi && !step.completed;
                const timeStr = this.fmtDT(step.time);
                const isNoTimer = step.noTimer;
                const durStr = isNoTimer ? 'No timer' : (step.duration > 0 ? `${step.duration} ${step.unit}` : 'Ready');
                const hasPostProofChoice = step.postProofChoice || (recipeStep && recipeStep.postProofChoice);
                const needsChoice = hasPostProofChoice && isActive && !step.postProofDecision;
                const hasBulkFermentChoice = step.bulkFermentChoice || (recipeStep && recipeStep.bulkFermentChoice);
                const needsBulkChoice = hasBulkFermentChoice && isActive && !step.bulkFermentDecision;
                const needsFrozen = step.waitingForFrozenInput && isActive;

                let bulkChoiceHtml = '';
                if (needsBulkChoice) {
                    bulkChoiceHtml = `<div class="choice-cards">
                        <div class="choice-card" onclick="app.handleBulkFermentChoice('${bake.id}',${index},'room')"><div class="choice-card-icon">🌡️</div><div class="choice-card-text"><h4>Room temperature</h4><p>~5 hours (up to 8 hours is fine)</p></div></div>
                        <div class="choice-card" onclick="app.handleBulkFermentChoice('${bake.id}',${index},'fridge')"><div class="choice-card-icon">❄️</div><div class="choice-card-text"><h4>In the fridge</h4><p>8-14 hours, slower rise, more flavor</p></div></div>
                    </div>`;
                }

                let choiceHtml = '';
                if (needsChoice) {
                    if (bake.recipeKey === 'pizza') {
                        choiceHtml = `<div class="choice-cards">
                            <div class="choice-card" onclick="app.handlePostProofChoice('${bake.id}',${index},'today')"><div class="choice-card-icon">🔥</div><div class="choice-card-text"><h4>Continue baking</h4><p>Preheat oven and bake today</p></div></div>
                            <div class="choice-card" onclick="app.handlePostProofChoice('${bake.id}',${index},'refrigerate')"><div class="choice-card-icon">❄️</div><div class="choice-card-text"><h4>Refrigerate</h4><p>Store 24-48 hours for more flavor</p></div></div>
                            <div class="choice-card" onclick="app.handlePostProofChoice('${bake.id}',${index},'freeze')"><div class="choice-card-icon">🧊</div><div class="choice-card-text"><h4>Freeze</h4><p>Save for up to 2 months</p></div></div>
                        </div>`;
                    } else {
                        // Generic: show today + cold proof options if recipe has those branches
                        const hasCold = recipe && recipe.steps.some(s => s.branch === 'cold');
                        choiceHtml = `<div class="choice-cards">
                            <div class="choice-card" onclick="app.handlePostProofChoice('${bake.id}',${index},'today')"><div class="choice-card-icon">🔥</div><div class="choice-card-text"><h4>Bake today</h4><p>Continue to bake day steps</p></div></div>
                            ${hasCold ? `<div class="choice-card" onclick="app.handlePostProofChoice('${bake.id}',${index},'cold')"><div class="choice-card-icon">❄️</div><div class="choice-card-text"><h4>Cold proof</h4><p>8-16 hours in fridge, better flavor + easier scoring</p></div></div>` : ''}
                        </div>`;
                    }
                }

                // For noTimer steps: show mark complete directly (no start timer button needed)
                let actionHtml = '';
                if (isActive && !isCompleted && !needsChoice && !needsFrozen && !needsBulkChoice) {
                    if (isNoTimer) {
                        actionHtml = `<div class="step-toggle-row">
                            <span class="step-toggle-label">Mark complete</span>
                            <label class="ios-toggle"><input type="checkbox" onchange="app.completeStep('${bake.id}',${index})"><span class="slider"></span></label>
                        </div>`;
                    } else if (!step.started) {
                        actionHtml = `<button class="start-timer-btn" onclick="app.startStep('${bake.id}',${index})">▶ Start Timer</button>`;
                    } else {
                        actionHtml = `<div class="step-toggle-row">
                            <span class="step-toggle-label">Mark complete</span>
                            <label class="ios-toggle"><input type="checkbox" onchange="app.completeStep('${bake.id}',${index})"><span class="slider"></span></label>
                        </div>
                        ${recipeStep && recipeStep.options && !recipeStep.expandable ? `<div class="step-actions"><button class="btn btn-secondary" onclick="app.adjustStepOptions('${bake.id}',${index})">Adjust Options</button></div>` : ''}`;
                    }
                }

                return `<div class="step-card ${isCompleted?'completed':''} ${isActive?'active':''}" id="step_${index}">
                    <div class="step-header">
                        <div style="flex:1">
                            <div class="step-title">${step.name}</div>
                            ${step.selectedOption ? `<div style="color:#8E8E93;font-size:13px">${step.selectedOption}</div>` : ''}
                        </div>
                        <div style="display:flex;align-items:center;gap:8px">
                            ${step.guidance ? `<button class="info-btn" onclick="app.toggleGuidance(${index})" id="infobtn_${index}">i</button>` : ''}
                            <div class="step-time">${timeStr}</div>
                        </div>
                    </div>
                    <div class="step-duration">${durStr}</div>
                    ${hasPostProofChoice && !isActive && !isCompleted ? `<div style="color:#8E8E93;font-size:13px;margin-top:4px">↳ Choose bake today or cold proof after this step</div>` : ''}
                    ${step.alert && !isCompleted ? `<div style="background:rgba(255,214,10,0.15);border:1px solid rgba(255,214,10,0.3);border-radius:8px;padding:8px 12px;margin-top:8px;font-size:14px;color:#FFD60A;font-weight:500">⚠ ${step.alert}</div>` : ''}
                    ${step.guidance ? (() => {
                        const m = bake.ingredientMultiplier || 1;
                        const sc = (t) => m > 1 ? this.scaleIng(t, m) : t;
                        return `<div class="step-guidance"><div class="guidance-content hidden" id="guidance_${index}">
                        ${step.guidance.visual ? `<strong>Visual cues:</strong><ul>${step.guidance.visual.map(c=>`<li>${sc(c)}</li>`).join('')}</ul>` : ''}
                        ${step.guidance.tips ? `<strong>Tips:</strong><ul>${step.guidance.tips.map(t=>`<li>${sc(t)}</li>`).join('')}</ul>` : ''}
                    </div></div>`;
                    })() : ''}
                    ${bulkChoiceHtml}
                    ${choiceHtml}
                    ${needsFrozen ? `<div class="frozen-input-section">
                        <label>When did you pull the dough out of the freezer?</label>
                        <input type="datetime-local" id="frozenPullTime_${index}">
                        <button class="btn btn-success" onclick="app.setFrozenPullTime('${bake.id}',${index})">Set Time & Continue</button>
                    </div>` : ''}
                    ${actionHtml}
                    ${isActive ? `<textarea class="step-note-input" placeholder="Add a note..." rows="1" onblur="app.saveStepNote('${bake.id}',${index},this.value)" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'">${step.stepNote || ''}</textarea>` : ''}
                    ${isCompleted && step.stepNote ? `<div class="step-note-display">${step.stepNote}</div>` : ''}
                    ${isCompleted && index === csi - 1 ? `<button class="btn btn-secondary btn-sm" style="margin-top:8px;width:100%" onclick="app.uncompleteStep('${bake.id}',${index})">↩ Undo Complete</button>` : ''}
                </div>`;
            },

            toggleGuidance(i) {
                const c = document.getElementById(`guidance_${i}`);
                const b = document.getElementById(`infobtn_${i}`);
                c.classList.toggle('hidden');
                b.classList.toggle('active');
            },

            handleBulkFermentChoice(bakeId, stepIndex, choice) {
                const bake = this.activeBakes.find(b => b.id === bakeId);
                if (!bake) return;
                bake.steps[stepIndex].bulkFermentDecision = choice;
                if (choice === 'fridge') {
                    bake.steps[stepIndex].duration = 11;
                    bake.steps[stepIndex].unit = 'hours';
                    bake.steps[stepIndex].name = 'Bulk fermentation (fridge)';
                } else {
                    bake.steps[stepIndex].duration = 5;
                    bake.steps[stepIndex].unit = 'hours';
                    bake.steps[stepIndex].name = 'Bulk fermentation (room temp)';
                }
                // Recalculate subsequent step times
                let ct = new Date(bake.steps[stepIndex].time);
                for (let i = stepIndex; i < bake.steps.length; i++) {
                    bake.steps[i].time = new Date(ct);
                    bake.steps[i].notified = false;
                    const d = bake.steps[i].duration || 0;
                    ct = new Date(ct.getTime() + d * (bake.steps[i].unit === 'hours' ? 3600000 : 60000));
                }
                this.saveActiveBakes();
                this.renderTimelineSteps(bake);
                this.updateGlobalTimerBanner();
            },

            handlePostProofChoice(bakeId, stepIndex, choice) {
                const bake = this.activeBakes.find(b => b.id === bakeId);
                if (!bake) return;
                const recipes = this.getRecipes();
                const recipe = recipes[bake.recipeKey];

                bake.steps[stepIndex].postProofDecision = choice;
                bake.steps = bake.steps.slice(0, stepIndex + 1);
                const now = new Date();

                if (bake.recipeKey === 'pizza') {
                    let currentTime = new Date(now);
                    if (choice === 'today') {
                        recipe.steps.filter(s => s.branch === 'today').forEach(step => {
                            const d = step.duration || 0;
                            bake.steps.push({ name: step.name, time: new Date(currentTime), duration: d, unit: step.unit, guidance: step.guidance, completed: false, branch: 'today', stepIndex: recipe.steps.indexOf(step) });
                            currentTime = new Date(currentTime.getTime() + d * (step.unit === 'hours' ? 3600000 : 60000));
                        });
                    } else if (choice === 'refrigerate') {
                        const fs = recipe.steps.find(s => s.branch === 'refrigerate');
                        bake.steps.push({ name: fs.name, time: new Date(currentTime), duration: fs.duration, unit: fs.unit, guidance: fs.guidance, completed: false, branch: 'refrigerate', stepIndex: recipe.steps.indexOf(fs) });
                        currentTime = new Date(currentTime.getTime() + fs.duration * 60000);
                        recipe.steps.filter(s => s.branch === 'today').forEach(step => {
                            const d = step.duration || 0;
                            bake.steps.push({ name: step.name, time: new Date(currentTime), duration: d, unit: step.unit, guidance: step.guidance, completed: false, branch: 'today', stepIndex: recipe.steps.indexOf(step) });
                            currentTime = new Date(currentTime.getTime() + d * (step.unit === 'hours' ? 3600000 : 60000));
                        });
                    } else if (choice === 'freeze') {
                        const fz = recipe.steps.find(s => s.branch === 'freeze');
                        bake.steps.push({ name: fz.name, time: new Date(now), duration: 0, unit: fz.unit, guidance: fz.guidance, completed: false, branch: 'freeze', stepIndex: recipe.steps.indexOf(fz) });
                        bake.steps.push({
                            name: "Thaw & proof", time: new Date(now), duration: 180, unit: 'minutes',
                            guidance: { visual: ["Thaw in fridge 12-24 hours", "Then proof at room temp 1-3 hours until puffy"], tips: ["Dough should be relaxed and stretchy before shaping"] },
                            completed: false, branch: 'freeze', stepIndex: recipe.steps.indexOf(fz), waitingForFrozenInput: true
                        });
                        let ct = new Date(now.getTime() + 180 * 60000);
                        recipe.steps.filter(s => s.branch === 'today').forEach(step => {
                            const d = step.duration || 0;
                            bake.steps.push({ name: step.name, time: new Date(ct), duration: d, unit: step.unit, guidance: step.guidance, completed: false, branch: 'today', stepIndex: recipe.steps.indexOf(step) });
                            ct = new Date(ct.getTime() + d * (step.unit === 'hours' ? 3600000 : 60000));
                        });
                    }
                } else {
                    // Generic handler for sourdough, chocoEspresso, pretzelBread, etc.
                    let currentTime = new Date(now);
                    if (choice === 'cold') {
                        const coldStep = recipe.steps.find(s => s.branch === 'cold');
                        if (coldStep) {
                            bake.steps.push({
                                name: coldStep.name, time: new Date(currentTime),
                                duration: coldStep.duration, unit: coldStep.unit,
                                guidance: coldStep.guidance, completed: false,
                                branch: 'cold', stepIndex: recipe.steps.indexOf(coldStep)
                            });
                            currentTime = new Date(currentTime.getTime() + coldStep.duration * (coldStep.unit === 'hours' ? 3600000 : 60000));
                        }
                    }
                    // Add baking day steps
                    recipe.steps.filter(s => s.branch === 'today').forEach(step => {
                        const d = typeof step.duration === 'object' ? (step.duration.min + step.duration.max) / 2 : (step.duration || 0);
                        const u = (typeof step.duration === 'object' ? step.duration.unit : step.unit) || 'minutes';
                        bake.steps.push({
                            name: step.name, time: new Date(currentTime),
                            duration: d, unit: u, guidance: step.guidance,
                            completed: false, branch: 'today',
                            stepIndex: recipe.steps.indexOf(step)
                        });
                        currentTime = new Date(currentTime.getTime() + d * (u === 'hours' ? 3600000 : 60000));
                    });
                }

                this.saveActiveBakes();
                this.renderTimelineSteps(bake);
                this.updateGlobalTimerBanner();
            },

            setFrozenPullTime(bakeId, stepIndex) {
                const bake = this.activeBakes.find(b => b.id === bakeId);
                if (!bake) return;
                const input = document.getElementById(`frozenPullTime_${stepIndex}`);
                if (!input || !input.value) { alert('Please select a time.'); return; }
                const pullTime = new Date(input.value);
                bake.steps[stepIndex].time = new Date(pullTime);
                bake.steps[stepIndex].waitingForFrozenInput = false;
                let ct = new Date(pullTime.getTime() + 180 * 60000);
                for (let i = stepIndex + 1; i < bake.steps.length; i++) {
                    bake.steps[i].time = new Date(ct);
                    bake.steps[i].notified = false;
                    const d = bake.steps[i].duration || 0;
                    ct = new Date(ct.getTime() + d * (bake.steps[i].unit === 'hours' ? 3600000 : 60000));
                }
                this.saveActiveBakes();
                this.renderTimelineSteps(bake);
                this.updateGlobalTimerBanner();
            },

            startStep(bakeId, stepIndex) {
                const bake = this.activeBakes.find(b => b.id === bakeId);
                if (!bake) return;
                const now = new Date();
                bake.steps[stepIndex].started = true;
                bake.steps[stepIndex].time = new Date(now);
                // Recalculate subsequent step times from now
                let ct = new Date(now);
                for (let i = stepIndex; i < bake.steps.length; i++) {
                    bake.steps[i].time = new Date(ct);
                    bake.steps[i].notified = false;
                    const d = bake.steps[i].duration || 0;
                    ct = new Date(ct.getTime() + d * (bake.steps[i].unit === 'hours' ? 3600000 : 60000));
                }
                this.saveActiveBakes();
                this.renderTimelineSteps(bake);
                this.updateGlobalTimerBanner();
            },

            saveStepNote(bakeId, stepIndex, text) {
                const bake = this.activeBakes.find(b => b.id === bakeId);
                if (!bake) return;
                bake.steps[stepIndex].stepNote = text.trim();
                this.saveActiveBakes();
            },

            completeStep(bakeId, stepIndex) {
                const bake = this.activeBakes.find(b => b.id === bakeId);
                if (!bake) return;
                const now = new Date();
                bake.steps[stepIndex].completed = true;
                bake.steps[stepIndex].completedAt = now;
                bake.currentStepIndex = stepIndex + 1;
                // If this step has autoStartNext, auto-start the next step's timer
                const autoNext = bake.steps[stepIndex].autoStartNext;
                let ct = new Date(now);
                for (let i = stepIndex + 1; i < bake.steps.length; i++) {
                    bake.steps[i].time = new Date(ct);
                    bake.steps[i].notified = false;
                    const d = bake.steps[i].duration || 0;
                    ct = new Date(ct.getTime() + d * (bake.steps[i].unit === 'hours' ? 3600000 : 60000));
                }
                if (autoNext && bake.steps[stepIndex + 1] && !bake.steps[stepIndex + 1].completed) {
                    bake.steps[stepIndex + 1].started = true;
                }
                this.saveActiveBakes();
                this.renderTimelineSteps(bake);
                this.updateGlobalTimerBanner();
            },

            uncompleteStep(bakeId, stepIndex) {
                const bake = this.activeBakes.find(b => b.id === bakeId);
                if (!bake) return;
                bake.steps[stepIndex].completed = false;
                bake.steps[stepIndex].completedAt = null;
                bake.steps[stepIndex].started = true;
                // Reset currentStepIndex to this step
                bake.currentStepIndex = stepIndex;
                // Recalculate future step times from this step
                const now = new Date();
                const d = bake.steps[stepIndex].duration || 0;
                let ct = new Date(now.getTime() + d * (bake.steps[stepIndex].unit === 'hours' ? 3600000 : 60000));
                for (let i = stepIndex + 1; i < bake.steps.length; i++) {
                    bake.steps[i].time = new Date(ct);
                    bake.steps[i].notified = false;
                    const sd = bake.steps[i].duration || 0;
                    ct = new Date(ct.getTime() + sd * (bake.steps[i].unit === 'hours' ? 3600000 : 60000));
                }
                this.saveActiveBakes();
                this.renderTimelineSteps(bake);
                this.updateGlobalTimerBanner();
            },

            getCurrentStepIndex(bake) {
                for (let i = 0; i < bake.steps.length; i++) { if (!bake.steps[i].completed) return i; }
                return bake.steps.length - 1;
            },

            updateGlobalTimerBanner() {
                if (this.currentScreen === 'timelineView' && this.currentBakeId) {
                    const bake = this.activeBakes.find(b => b.id === this.currentBakeId);
                    if (bake) { this.updatePerBakeTimerBanner(bake); return; }
                }
                document.getElementById('timerBanner').classList.remove('per-bake');
                // Hide on main screen — active bake cards already show timer/step info
                if (this.currentScreen === 'main' || this.activeBakes.length === 0) { document.getElementById('timerBanner').classList.add('hidden'); return; }

                let urgent = null, shortest = Infinity;
                const now = new Date();
                this.activeBakes.forEach(bake => {
                    const csi = this.getCurrentStepIndex(bake);
                    const cs = bake.steps[csi];
                    if (!cs.completed) {
                        // Calculate actual remaining time (end of current step)
                        const nsi = csi + 1;
                        let endTime;
                        if (nsi < bake.steps.length) {
                            endTime = bake.steps[nsi].time.getTime();
                        } else {
                            endTime = cs.time.getTime() + cs.duration * (cs.unit === 'hours' ? 3600000 : 60000);
                        }
                        const tr = endTime - now.getTime();
                        if (tr < shortest) { shortest = tr; urgent = bake; }
                    }
                });
                if (!urgent) { document.getElementById('timerBanner').classList.add('hidden'); return; }

                document.getElementById('timerBanner').classList.remove('hidden');
                const pf = document.getElementById('bannerProgressFill');
                const csi = this.getCurrentStepIndex(urgent);
                const cs = urgent.steps[csi];

                document.getElementById('bannerRecipeName').textContent = urgent.recipeName;
                document.getElementById('bannerCurrentStep').textContent = `${urgent.recipeName} — ${cs.name}`;

                if (!cs.started) {
                    pf.classList.add('done'); pf.style.width = '100%';
                    document.getElementById('bannerTimeRemaining').textContent = 'Not started';
                    document.getElementById('bannerTimeRemaining').style.color = '#8E8E93';
                } else {
                    const nsi = csi + 1;
                    let tr, tsd;
                    if (nsi < urgent.steps.length) {
                        const se = urgent.steps[nsi].time.getTime(), ss = cs.time.getTime();
                        tr = se - now.getTime(); tsd = se - ss;
                    } else {
                        tsd = cs.duration * (cs.unit === 'hours' ? 3600000 : 60000);
                        tr = (cs.time.getTime() + tsd) - now.getTime();
                    }

                    if (tr > 0 && tsd > 0) {
                        pf.classList.remove('done'); pf.style.width = `${Math.max(0,Math.min(100,(tr/tsd)*100))}%`;
                        document.getElementById('bannerTimeRemaining').textContent = this.fmtTR(tr);
                        document.getElementById('bannerTimeRemaining').style.color = '#8E8E93';
                    } else if (!cs.completed) {
                        pf.classList.add('done'); pf.style.width = '0%';
                        document.getElementById('bannerTimeRemaining').textContent = 'Ready!';
                        document.getElementById('bannerTimeRemaining').style.color = '#FFD60A';
                    } else {
                        pf.classList.add('done'); pf.style.width = '0%';
                        document.getElementById('bannerTimeRemaining').textContent = 'Done';
                        document.getElementById('bannerTimeRemaining').style.color = '#30D158';
                    }
                }

                if (csi < urgent.steps.length - 1) {
                    document.getElementById('bannerNextStep').textContent = `Next: ${urgent.steps[csi+1].name} at ${this.fmtT(urgent.steps[csi+1].time)}`;
                } else {
                    document.getElementById('bannerNextStep').textContent = 'Final step!';
                }
            },

            updatePerBakeTimerBanner(bake) {
                const banner = document.getElementById('timerBanner');
                const pf = document.getElementById('bannerProgressFill');
                const csi = this.getCurrentStepIndex(bake);
                const cs = bake.steps[csi];
                const now = new Date();

                banner.classList.remove('hidden');
                banner.classList.add('per-bake');
                document.getElementById('bannerRecipeName').textContent = bake.recipeName;
                document.getElementById('bannerCurrentStep').textContent = cs.name;

                if (cs.completed) {
                    document.getElementById('bannerTimeRemaining').textContent = 'All done!';
                    document.getElementById('bannerTimeRemaining').style.color = '#30D158';
                    pf.classList.add('done'); pf.style.width = '0%';
                } else if (!cs.started) {
                    pf.classList.add('done'); pf.style.width = '100%';
                    document.getElementById('bannerTimeRemaining').textContent = 'Not started';
                    document.getElementById('bannerTimeRemaining').style.color = '#8E8E93';
                } else {
                    pf.classList.remove('done');
                    const nsi = csi + 1;
                    let ct, tsd;
                    if (nsi < bake.steps.length) {
                        const se = bake.steps[nsi].time.getTime(), ss = cs.time.getTime();
                        ct = se - now.getTime(); tsd = se - ss;
                    } else {
                        tsd = cs.duration * (cs.unit === 'hours' ? 3600000 : 60000);
                        ct = (cs.time.getTime() + tsd) - now.getTime();
                    }
                    if (ct > 0 && tsd > 0) {
                        pf.style.width = `${Math.max(0,Math.min(100,(ct/tsd)*100))}%`;
                        document.getElementById('bannerTimeRemaining').textContent = this.fmtTR(ct);
                        document.getElementById('bannerTimeRemaining').style.color = '#8E8E93';
                    } else {
                        pf.classList.add('done'); pf.style.width = '0%';
                        document.getElementById('bannerTimeRemaining').textContent = 'Ready!';
                        document.getElementById('bannerTimeRemaining').style.color = '#FFD60A';
                    }
                }
                if (csi < bake.steps.length - 1) {
                    document.getElementById('bannerNextStep').textContent = `Next: ${bake.steps[csi+1].name} at ${this.fmtT(bake.steps[csi+1].time)}`;
                } else {
                    document.getElementById('bannerNextStep').textContent = 'Final step!';
                }
            },

            handleBannerClick() {
                if (this.currentScreen === 'timelineView' && this.currentBakeId) {
                    const bake = this.activeBakes.find(b => b.id === this.currentBakeId);
                    if (bake) {
                        const el = document.getElementById(`step_${this.getCurrentStepIndex(bake)}`);
                        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    const id = this.getNextActiveBakeId();
                    if (id) this.showTimelineView(id);
                }
            },

            getNextActiveBakeId() {
                if (this.activeBakes.length === 0) return null;
                let urgent = this.activeBakes[0], shortest = Infinity;
                const now = new Date();
                this.activeBakes.forEach(bake => {
                    const cs = bake.steps[this.getCurrentStepIndex(bake)];
                    if (!cs.completed) {
                        const tr = cs.time - now;
                        if (tr < shortest) { shortest = tr; urgent = bake; }
                    }
                });
                return urgent.id;
            },

            fmtTR(ms) {
                const ts = Math.floor(ms / 1000);
                const h = Math.floor(ts / 3600), m = Math.floor((ts % 3600) / 60), s = ts % 60;
                return h > 0 ? `${h}h ${m}m` : `${m}m ${s.toString().padStart(2,'0')}s`;
            },

            startTimerUpdates() {
                if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
                this.timerInterval = setInterval(() => {
                    this.updateGlobalTimerBanner();
                    this.checkForNotifications();
                    if (this.currentScreen === 'main' && this.activeBakes.length > 0) {
                        this.renderActiveBakes();
                    }
                }, 1000);
            },

            checkForNotifications() {
                const now = new Date();
                // Check starter feeding reminder
                if (this.starterReminderTime && !this.starterReminderFired && now >= this.starterReminderTime) {
                    this.sendStarterReminder();
                }
                this.activeBakes.forEach(bake => {
                    bake.steps.forEach((step, i) => {
                        if (step.completed || step.notified || !step.started || step.noNotification) return;
                        if (step.time - now <= 0) {
                            step.notified = true;
                            this.sendNotification(bake, step, i);
                            this.saveActiveBakes();
                        }
                    });
                });
            },

            sendNotification(bake, step, si) {
                if ('Notification' in window && Notification.permission === 'granted') {
                    const ns = bake.steps[si + 1];
                    const body = ns ? `Time for: ${step.name}\nNext: ${ns.name}` : `Time for: ${step.name}\nFinal step!`;
                    const n = new Notification(`${bake.recipeName}`, { body, tag: `rs-${bake.id}-${si}`, requireInteraction: true, vibrate: [200, 100, 200] });
                    n.onclick = () => { window.focus(); this.showTimelineView(bake.id); n.close(); };
                }
                this.showToast(bake.recipeName, step.name);
                this.playAlert();
            },

            showToast(title, stepName) {
                const ex = document.querySelector('.notification-toast');
                if (ex) ex.remove();
                const t = document.createElement('div');
                t.className = 'notification-toast';
                t.innerHTML = `<div class="notification-toast-title">${title}</div><div class="notification-toast-body">Time for: ${stepName}</div>`;
                document.body.appendChild(t);
                const dismiss = () => { t.style.animation = 'slideDown 0.3s reverse forwards'; setTimeout(() => t.remove(), 300); };
                const autoTimer = setTimeout(dismiss, 3000);
                t.onclick = () => { clearTimeout(autoTimer); dismiss(); };
                // Swipe up to dismiss
                let startY = 0;
                t.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
                t.addEventListener('touchmove', e => {
                    const dy = e.touches[0].clientY - startY;
                    if (dy < 0) t.style.transform = `translateY(${dy}px)`;
                }, { passive: true });
                t.addEventListener('touchend', e => {
                    const dy = e.changedTouches[0].clientY - startY;
                    if (dy < -30) { clearTimeout(autoTimer); dismiss(); }
                    else t.style.transform = '';
                });
            },

            playAlert() {
                try {
                    if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const ac = this.audioCtx;
                    if (ac.state === 'suspended') ac.resume();
                    const notes = [523, 659, 784]; // C5, E5, G5 ascending chime
                    notes.forEach((freq, i) => {
                        const o = ac.createOscillator(), g = ac.createGain();
                        o.connect(g); g.connect(ac.destination);
                        o.frequency.value = freq; o.type = 'sine';
                        const t = ac.currentTime + i * 0.15;
                        g.gain.setValueAtTime(0.25, t);
                        g.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
                        o.start(t); o.stop(t + 0.4);
                    });
                } catch (e) {}
            },

            adjustStepOptions(bakeId, bsi) {
                const bake = this.activeBakes.find(b => b.id === bakeId);
                if (!bake) return;
                const recipes = this.getRecipes();
                const recipe = recipes[bake.recipeKey];
                const rsi = bake.steps[bsi].stepIndex;
                const step = recipe.steps[rsi];
                if (!step || !step.options) return;

                const co = bake.selectedOptions[rsi] || 0;
                const oh = step.options.map((o, i) => `<option value="${i}" ${i===co?'selected':''}>${o.name}</option>`).join('');
                const modal = document.createElement('div');
                modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)';
                modal.innerHTML = `<div style="background:#1C1C1E;padding:24px;border-radius:16px;max-width:400px;width:100%">
                    <h3 style="color:#fff;margin-bottom:16px;font-size:17px;font-weight:700">Adjust ${step.name}</h3>
                    <select id="optionSelect" style="width:100%;padding:14px;background:#2C2C2E;border:none;border-radius:12px;color:#FFF;font-size:17px;margin-bottom:16px">${oh}</select>
                    <div style="display:flex;gap:10px">
                        <button onclick="app.applyOptionChange('${bakeId}',${bsi})" style="flex:1;background:#0A84FF;color:white;border:none;padding:14px;border-radius:12px;cursor:pointer;font-size:17px;font-weight:600">Apply</button>
                        <button onclick="app.closeModal()" style="flex:1;background:#2C2C2E;color:white;border:none;padding:14px;border-radius:12px;cursor:pointer;font-size:17px;font-weight:600">Cancel</button>
                    </div></div>`;
                document.body.appendChild(modal);
                this.currentModal = modal;
            },

            applyOptionChange(bakeId, bsi) {
                const bake = this.activeBakes.find(b => b.id === bakeId);
                if (!bake) return;
                const noi = parseInt(document.getElementById('optionSelect').value);
                const recipes = this.getRecipes();
                const recipe = recipes[bake.recipeKey];
                const rsi = bake.steps[bsi].stepIndex;
                const rs = recipe.steps[rsi];
                const no = rs.options[noi];

                bake.selectedOptions[rsi] = noi;
                bake.steps[bsi].duration = no.duration;
                bake.steps[bsi].unit = no.unit || rs.unit;
                bake.steps[bsi].selectedOption = no.name;

                let ct = new Date(bake.steps[bsi].time);
                for (let i = bsi; i < bake.steps.length; i++) {
                    bake.steps[i].time = new Date(ct);
                    bake.steps[i].notified = false;
                    const d = bake.steps[i].duration || 0;
                    ct = new Date(ct.getTime() + d * (bake.steps[i].unit === 'hours' ? 3600000 : 60000));
                }
                this.saveActiveBakes();
                this.closeModal();
                this.showTimelineView(bakeId);
            },

            closeModal() {
                if (this.currentModal) { this.currentModal.remove(); this.currentModal = null; }
            },

            renderBakeNotes(bake) {
                const container = document.getElementById('bakeNotesSection');
                if (!container) return;
                if (!bake.notes) bake.notes = [];
                let notesHtml = bake.notes.map((note, i) => `<div class="bake-note-entry">
                    <div class="note-time">${this.fmtDT(new Date(note.time))}</div>
                    ${note.text ? `<div class="note-text">${note.text}</div>` : ''}
                    ${note.photo ? `<img class="note-photo" src="${note.photo}" alt="Bake photo">` : ''}
                </div>`).join('');

                container.innerHTML = `<h3>Notes</h3>
                    ${notesHtml}
                    <div class="note-input-row">
                        <input type="text" id="noteInput_${bake.id}" placeholder="Add a note...">
                        <button class="note-photo-btn" onclick="app.addBakePhoto('${bake.id}')">📷</button>
                        <button class="note-add-btn" onclick="app.addBakeNote('${bake.id}')">+</button>
                    </div>
                    <input type="file" id="photoInput_${bake.id}" accept="image/*" style="display:none" onchange="app.handlePhotoSelected('${bake.id}')">`;
            },

            addBakeNote(bakeId) {
                const bake = this.activeBakes.find(b => b.id === bakeId);
                if (!bake) return;
                const input = document.getElementById(`noteInput_${bakeId}`);
                if (!input || !input.value.trim()) return;
                if (!bake.notes) bake.notes = [];
                bake.notes.push({ text: input.value.trim(), time: new Date().toISOString() });
                this.saveActiveBakes();
                this.renderBakeNotes(bake);
            },

            addBakePhoto(bakeId) {
                const input = document.getElementById(`photoInput_${bakeId}`);
                if (input) input.click();
            },

            handlePhotoSelected(bakeId) {
                const bake = this.activeBakes.find(b => b.id === bakeId);
                if (!bake) return;
                const input = document.getElementById(`photoInput_${bakeId}`);
                if (!input || !input.files[0]) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    if (!bake.notes) bake.notes = [];
                    // Resize image to avoid localStorage bloat
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const maxW = 800;
                        const scale = img.width > maxW ? maxW / img.width : 1;
                        canvas.width = img.width * scale;
                        canvas.height = img.height * scale;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        bake.notes.push({ photo: canvas.toDataURL('image/jpeg', 0.7), time: new Date().toISOString() });
                        this.saveActiveBakes();
                        this.renderBakeNotes(bake);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            },

            recipeRefExpanded: {},

            renderRecipeReference(bake) {
                const container = document.getElementById('recipeRefSection');
                if (!container) return;
                const recipes = this.getRecipes();
                const recipe = recipes[bake.recipeKey];
                if (!recipe) { container.innerHTML = ''; return; }
                const isOpen = this.recipeRefExpanded[bake.id] || false;

                let bodyHtml = '<div class="recipe-ref-body' + (isOpen ? ' open' : '') + '" id="recipeRefBody_' + bake.id + '">';
                bodyHtml += '<div style="padding-top:12px">';

                // Ingredients
                const m = bake.ingredientMultiplier || 1;
                bodyHtml += '<h4 style="color:#fff;font-size:15px;font-weight:600;margin-bottom:8px">Ingredients</h4><ul style="color:#EBEBF5;font-size:15px;margin-left:18px;line-height:1.6">';
                recipe.ingredients.forEach(ing => {
                    bodyHtml += `<li>${m > 1 ? this.scaleIng(ing, m) : ing}</li>`;
                });
                bodyHtml += '</ul>';

                // Steps
                const branchLabels = { 'today': 'Bake Day', 'cold': 'Cold Proof Option', 'refrigerate': 'Refrigerate Option', 'freeze': 'Freeze Option' };
                let lastBranch = null;
                bodyHtml += '<h4 style="color:#fff;font-size:15px;font-weight:600;margin:16px 0 8px">Steps</h4>';
                recipe.steps.forEach((step) => {
                    if (step.branch && step.branch !== lastBranch) {
                        bodyHtml += `<div style="color:#0A84FF;font-size:13px;font-weight:600;margin:12px 0 6px;text-transform:uppercase">${branchLabels[step.branch] || step.branch}</div>`;
                        lastBranch = step.branch;
                    }
                    const dur = typeof step.duration === 'object' ? `${step.duration.min}-${step.duration.max} ${step.duration.unit || 'min'}` : (step.duration ? `${step.duration} ${step.unit || 'min'}` : '');
                    bodyHtml += `<div style="color:#EBEBF5;font-size:14px;padding:4px 0"><strong>${step.name}</strong>${dur ? ` — ${dur}` : ''}</div>`;
                    if (step.guidance && step.guidance.visual) {
                        bodyHtml += '<ul style="color:#8E8E93;font-size:13px;margin-left:18px;line-height:1.5">';
                        step.guidance.visual.forEach(v => { bodyHtml += `<li>${m > 1 ? this.scaleIng(v, m) : v}</li>`; });
                        bodyHtml += '</ul>';
                    }
                });
                bodyHtml += '</div></div>';

                container.innerHTML = `<div class="recipe-ref-header" onclick="app.toggleRecipeRef('${bake.id}')">
                    <h3>Full Recipe</h3>
                    <span class="ref-chevron ${isOpen ? 'open' : ''}">›</span>
                </div>${bodyHtml}`;
            },

            toggleRecipeRef(bakeId) {
                this.recipeRefExpanded[bakeId] = !this.recipeRefExpanded[bakeId];
                const body = document.getElementById(`recipeRefBody_${bakeId}`);
                if (body) body.classList.toggle('open');
                const chevron = document.querySelector(`#recipeRefSection .ref-chevron`);
                if (chevron) chevron.classList.toggle('open');
            },

            renderHistory() {
                const container = document.getElementById('historyCard');
                if (!container) return;
                if (this.bakeHistory.length === 0) {
                    container.classList.add('hidden');
                    return;
                }
                container.classList.remove('hidden');
                let html = '<h2>Bake History</h2>';
                this.bakeHistory.slice().reverse().forEach((entry) => {
                    const date = new Date(entry.finishedAt);
                    const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                    const noteCount = (entry.notes || []).length;
                    const noteLabel = noteCount > 0 ? ` · ${noteCount} note${noteCount > 1 ? 's' : ''}` : '';
                    html += `<div class="history-item" onclick="app.showHistoryDetail('${entry.id}')">
                        <h4>${entry.recipeName}</h4>
                        <p>${dateStr}${noteLabel}</p>
                    </div>`;
                });
                container.innerHTML = html;
            },

            showHistoryDetail(historyId) {
                const entry = this.bakeHistory.find(h => h.id === historyId);
                if (!entry) return;

                this.hideAllScreens();
                document.getElementById('historyDetailView').classList.remove('hidden');
                document.getElementById('historyDetailName').textContent = entry.recipeName;
                this.currentScreen = 'historyDetailView';

                const date = new Date(entry.finishedAt);
                const dateStr = date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
                let html = `<div style="color:#8E8E93;font-size:13px;margin-bottom:16px">Finished ${dateStr}</div>`;

                // Steps summary
                html += '<div style="background:#1C1C1E;border-radius:16px;padding:16px;margin-bottom:16px">';
                html += '<h3 style="color:#fff;font-size:17px;font-weight:600;margin-bottom:10px">Steps</h3>';
                (entry.steps || []).forEach(step => {
                    const dur = step.duration ? `${step.duration} ${step.unit || 'min'}` : '';
                    html += `<div style="padding:6px 0;color:#EBEBF5;font-size:15px"><span style="color:#30D158;margin-right:6px">✓</span>${step.name}${dur ? ` — ${dur}` : ''}${step.stepNote ? `<div style="color:#8E8E93;font-size:13px;margin-top:2px;font-style:italic">${step.stepNote}</div>` : ''}</div>`;
                });
                html += '</div>';

                // Notes
                const notes = entry.notes || [];
                if (notes.length > 0) {
                    html += '<div style="background:#1C1C1E;border-radius:16px;padding:16px;margin-bottom:16px">';
                    html += '<h3 style="color:#fff;font-size:17px;font-weight:600;margin-bottom:10px">Notes</h3>';
                    notes.forEach(note => {
                        html += '<div class="bake-note-entry">';
                        html += `<div class="note-time">${this.fmtDT(new Date(note.time))}</div>`;
                        if (note.text) html += `<div class="note-text">${note.text}</div>`;
                        if (note.photo) html += `<img class="note-photo" src="${note.photo}" alt="Bake photo">`;
                        html += '</div>';
                    });
                    html += '</div>';
                } else {
                    html += '<div class="history-empty">No notes for this bake</div>';
                }

                document.getElementById('historyDetailContent').innerHTML = html;
            },

            finishBake(bakeId) {
                const id = bakeId || this.currentBakeId;
                if (!id) return;
                if (confirm('Finish this bake? This cannot be undone.')) {
                    const bake = this.activeBakes.find(b => b.id === id);
                    if (bake) {
                        this.bakeHistory.push({
                            id: bake.id,
                            recipeKey: bake.recipeKey,
                            recipeName: bake.recipeName,
                            steps: bake.steps.map(s => ({ name: s.name, duration: s.duration, unit: s.unit, completed: s.completed, stepNote: s.stepNote || '' })),
                            notes: bake.notes || [],
                            finishedAt: new Date().toISOString()
                        });
                        this.saveBakeHistory();
                    }
                    this.activeBakes = this.activeBakes.filter(b => b.id !== id);
                    this.saveActiveBakes();
                    this.showMainScreen();
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
